name: Verify and Publish Nightly

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            tauri: node_modules/.bin/tauri
          - name: Windows
            os: windows-latest
            tauri: node_modules/.bin/tauri.cmd
          - name: Linux
            os: ubuntu-24.04
            tauri: node_modules/.bin/tauri
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: verify-${{ matrix.name }}
          workspaces: src-tauri -> target

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install cmake nasm --yes --no-progress

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake nasm pkg-config libssl-dev libudev-dev libasound2-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: npm run verify

      - name: Validate release scripts
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n scripts/package-dmg.sh scripts/generate-update-manifest.sh

      - name: Build desktop application
        run: ${{ matrix.tauri }} build --debug --no-bundle

  build-macos:
    name: Package macOS universal
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: macos-14
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-universal
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          npm ci
          brew install nasm

      - name: Read version metadata
        id: version
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          UPDATE_VERSION="${APP_VERSION%.*}.${BUILD_NUMBER}"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "update_version=${UPDATE_VERSION}"
            echo "installer=devicehub-mask_${APP_VERSION}+${BUILD_NUMBER}_universal.dmg"
            echo "updater=devicehub-mask_${APP_VERSION}-${BUILD_NUMBER}_universal.app.tar.gz"
          } >> "$GITHUB_OUTPUT"

      - name: Build Tauri application
        id: build
        shell: bash
        env:
          UPDATE_VERSION: ${{ steps.version.outputs.update_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CREATE_UPDATER=false
          SIGN_ARGS=(--no-sign)
          if [[ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            CREATE_UPDATER=true
            SIGN_ARGS=()
            echo "updater_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Updater signing key is not configured; signed update archive will be skipped"
            echo "updater_enabled=false" >> "$GITHUB_OUTPUT"
          fi
          BUILD_CONFIG=$(jq -nc \
            --arg version "$UPDATE_VERSION" \
            --arg bundleVersion "$BUILD_NUMBER" \
            --argjson createUpdaterArtifacts "$CREATE_UPDATER" \
            '{version: $version, bundle: {createUpdaterArtifacts: $createUpdaterArtifacts, macOS: {bundleVersion: $bundleVersion, signingIdentity: "-"}}}')
          node_modules/.bin/tauri build \
            --target universal-apple-darwin \
            --bundles app \
            "${SIGN_ARGS[@]}" \
            --ignore-version-mismatches \
            --config "$BUILD_CONFIG"

      - name: Stamp app and package DMG
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          BUNDLE_VERSION: ${{ steps.version.outputs.update_version }}
          ARTIFACT: ${{ steps.version.outputs.installer }}
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/DeviceHub Mask.app" \
            scripts/package-dmg.sh
          APP_PATH="dist/dmg/DeviceHub Mask.app"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          test "$(lipo -archs "$APP_PATH/Contents/MacOS/devicehub-mask")" = "x86_64 arm64"

      - name: Prepare macOS updater artifact
        if: steps.build.outputs.updater_enabled == 'true'
        shell: bash
        env:
          UPDATER: ${{ steps.version.outputs.updater }}
          UPDATE_VERSION: ${{ steps.version.outputs.update_version }}
        run: |
          SOURCE=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' -print -quit)
          test -n "$SOURCE"
          test -s "${SOURCE}.sig"
          cp "$SOURCE" "dist/${UPDATER}"
          cp "${SOURCE}.sig" "dist/${UPDATER}.sig"
          SIGNATURE=$(tr -d '\r\n' < "dist/${UPDATER}.sig")
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/${UPDATER}"
          jq -n --arg signature "$SIGNATURE" --arg url "$URL" \
            '{platforms: {"darwin-aarch64": {signature: $signature, url: $url}, "darwin-x86_64": {signature: $signature, url: $url}}}' \
            > dist/update-fragment-macos.json

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-macos
          path: |
            dist/*.dmg
            dist/*.sha256
            dist/*.app.tar.gz
            dist/*.app.tar.gz.sig
            dist/update-fragment-*.json
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Package Windows x64
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-windows-x64
          workspaces: src-tauri -> target

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install cmake nasm --yes --no-progress
          npm ci

      - name: Read version metadata
        id: version
        shell: pwsh
        run: |
          $appVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $buildNumber = "${env:GITHUB_RUN_NUMBER}"
          $parts = $appVersion.Split('.')
          $updateVersion = "$($parts[0]).$($parts[1]).${buildNumber}"
          "app_version=${appVersion}" >> $env:GITHUB_OUTPUT
          "build_number=${buildNumber}" >> $env:GITHUB_OUTPUT
          "update_version=${updateVersion}" >> $env:GITHUB_OUTPUT
          "nsis=devicehub-mask_${appVersion}+${buildNumber}_x64-setup.exe" >> $env:GITHUB_OUTPUT
          "msi=devicehub-mask_${appVersion}+${buildNumber}_x64.msi" >> $env:GITHUB_OUTPUT

      - name: Build Windows installers
        id: build
        shell: pwsh
        env:
          UPDATE_VERSION: ${{ steps.version.outputs.update_version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $createUpdater = -not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)
          "updater_enabled=$($createUpdater.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          if (-not $createUpdater) { Write-Warning "Updater signing key is not configured; signed update archive will be skipped" }
          $config = @{ version = $env:UPDATE_VERSION; bundle = @{ createUpdaterArtifacts = $createUpdater } } | ConvertTo-Json -Compress -Depth 5
          $config | Set-Content -Encoding utf8 tauri.ci.windows.json
          & node_modules/.bin/tauri.cmd build --verbose --bundles nsis,msi --ignore-version-mismatches --config tauri.ci.windows.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect Windows artifacts
        shell: pwsh
        env:
          NSIS: ${{ steps.version.outputs.nsis }}
          MSI: ${{ steps.version.outputs.msi }}
          UPDATER_ENABLED: ${{ steps.build.outputs.updater_enabled }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $nsisSource = Get-ChildItem src-tauri/target/release/bundle -Recurse -File -Filter '*-setup.exe' | Select-Object -First 1
          $msiSource = Get-ChildItem src-tauri/target/release/bundle -Recurse -File -Filter '*.msi' | Select-Object -First 1
          if (-not $nsisSource -or -not $msiSource) { throw 'Tauri did not produce both NSIS and MSI installers' }
          Copy-Item $nsisSource.FullName "dist/$env:NSIS"
          Copy-Item $msiSource.FullName "dist/$env:MSI"
          foreach ($file in @("dist/$env:NSIS", "dist/$env:MSI")) {
            $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLowerInvariant()
            "$hash  $([IO.Path]::GetFileName($file))" | Set-Content -Encoding ascii "${file}.sha256"
          }
          if ($env:UPDATER_ENABLED -eq 'true') {
            $signatureSource = "$($nsisSource.FullName).sig"
            if (-not (Test-Path $signatureSource)) { throw 'Signed NSIS updater artifact is missing' }
            Copy-Item $signatureSource "dist/$env:NSIS.sig"
            $signature = (Get-Content -Raw "dist/$env:NSIS.sig").Trim()
            $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/nightly/$env:NSIS"
            @{ platforms = @{ 'windows-x86_64' = @{ signature = $signature; url = $url } } } |
              ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 dist/update-fragment-windows.json
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-windows-x64
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Package Linux x64
    needs: verify
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-x64
          workspaces: src-tauri -> target

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake nasm pkg-config libssl-dev libudev-dev libasound2-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          npm ci

      - name: Read version metadata
        id: version
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          UPDATE_VERSION="${APP_VERSION%.*}.${BUILD_NUMBER}"
          {
            echo "app_version=${APP_VERSION}"
            echo "build_number=${BUILD_NUMBER}"
            echo "update_version=${UPDATE_VERSION}"
            echo "appimage=devicehub-mask_${APP_VERSION}+${BUILD_NUMBER}_amd64.AppImage"
            echo "deb=devicehub-mask_${APP_VERSION}+${BUILD_NUMBER}_amd64.deb"
          } >> "$GITHUB_OUTPUT"

      - name: Build Linux packages
        id: build
        shell: bash
        env:
          UPDATE_VERSION: ${{ steps.version.outputs.update_version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          CREATE_UPDATER=false
          if [[ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            CREATE_UPDATER=true
            echo "updater_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Updater signing key is not configured; signed update archive will be skipped"
            echo "updater_enabled=false" >> "$GITHUB_OUTPUT"
          fi
          BUILD_CONFIG=$(jq -nc --arg version "$UPDATE_VERSION" --argjson createUpdaterArtifacts "$CREATE_UPDATER" \
            '{version: $version, bundle: {createUpdaterArtifacts: $createUpdaterArtifacts}}')
          node_modules/.bin/tauri build \
            --bundles appimage,deb \
            --ignore-version-mismatches \
            --config "$BUILD_CONFIG"

      - name: Collect Linux artifacts
        shell: bash
        env:
          APPIMAGE: ${{ steps.version.outputs.appimage }}
          DEB: ${{ steps.version.outputs.deb }}
          UPDATER_ENABLED: ${{ steps.build.outputs.updater_enabled }}
        run: |
          mkdir -p dist
          find src-tauri/target/release/bundle -maxdepth 3 -type f -print
          APPIMAGE_SOURCE=$(find src-tauri/target/release/bundle -type f -name '*.AppImage' -print -quit)
          DEB_SOURCE=$(find src-tauri/target/release/bundle -type f -name '*.deb' -print -quit)
          test -n "$APPIMAGE_SOURCE"
          test -n "$DEB_SOURCE"
          cp "$APPIMAGE_SOURCE" "dist/${APPIMAGE}"
          cp "$DEB_SOURCE" "dist/${DEB}"
          sha256sum "dist/${APPIMAGE}" > "dist/${APPIMAGE}.sha256"
          sha256sum "dist/${DEB}" > "dist/${DEB}.sha256"
          if [[ "$UPDATER_ENABLED" == "true" ]]; then
            test -s "${APPIMAGE_SOURCE}.sig"
            cp "${APPIMAGE_SOURCE}.sig" "dist/${APPIMAGE}.sig"
            SIGNATURE=$(tr -d '\r\n' < "dist/${APPIMAGE}.sig")
            URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/${APPIMAGE}"
            jq -n --arg signature "$SIGNATURE" --arg url "$URL" \
              '{platforms: {"linux-x86_64": {signature: $signature, url: $url}}}' \
              > dist/update-fragment-linux.json
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nightly-linux-x64
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 14

  publish-nightly:
    name: Publish rolling nightly
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nightly-*
          path: dist
          merge-multiple: true

      - name: Generate cross-platform updater manifest
        shell: bash
        env:
          NOTES: DeviceHub Mask nightly build ${{ github.run_number }} (${{ github.sha }}).
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          UPDATE_VERSION="${APP_VERSION%.*}.${GITHUB_RUN_NUMBER}" \
          NOTES="$NOTES" \
            scripts/generate-update-manifest.sh

      - name: Upload combined workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: devicehub-mask-nightly-${{ github.run_number }}
          path: |
            dist/*
            !dist/update-fragment-*.json
          if-no-files-found: error
          retention-days: 14

      - name: Publish rolling nightly release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          UPDATE_VERSION="${APP_VERSION%.*}.${GITHUB_RUN_NUMBER}"
          git tag --force nightly "$GITHUB_SHA"
          git push origin refs/tags/nightly --force

          NOTES=$(cat <<EOF
          Automated DeviceHub Mask cross-platform nightly build.

          - Version: ${APP_VERSION}
          - Build: ${GITHUB_RUN_NUMBER}
          - Updater version: ${UPDATE_VERSION}
          - Platforms: macOS universal, Windows x64, Linux x64
          - Commit: ${GITHUB_SHA}
          EOF
          )

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --title "DeviceHub Mask Nightly ${APP_VERSION}+${GITHUB_RUN_NUMBER}" --notes "$NOTES" --prerelease --latest=false
            while IFS= read -r asset; do
              test -z "$asset" || gh release delete-asset nightly "$asset" --yes
            done < <(gh release view nightly --json assets --jq '.assets[].name')
          else
            gh release create nightly --title "DeviceHub Mask Nightly ${APP_VERSION}+${GITHUB_RUN_NUMBER}" --notes "$NOTES" --prerelease --latest=false
          fi

          mapfile -d '' ASSETS < <(find dist -maxdepth 1 -type f ! -name 'update-fragment-*.json' -print0)
          test "${#ASSETS[@]}" -gt 0
          gh release upload nightly "${ASSETS[@]}" --clobber
